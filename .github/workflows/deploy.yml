name: Deploy Backend

on:
  push:
    branches: [main]

env:
  APP_DIR: /home/ubuntu/Assessment-backend
  PM2_APP_NAME: backend
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────
  # JOB 1: RUN TESTS
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'                          # caches node_modules between runs

      - name: Install all dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────
  # JOB 2: DEPLOY
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: test                                 # only runs if tests pass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Save current commit SHA before deploy (for rollback reference) ──
      - name: Set commit SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── MAIN DEPLOYMENT ──
      - name: Deploy to EC2
        id: deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          command_timeout: 10m
          debug: false                          # set true if SSH connection itself is failing
          script: |

            echo "==============================="
            echo "  DEPLOYMENT STARTED"
            echo "  Commit: ${{ steps.vars.outputs.sha }}"
            echo "  Time:   $(date)"
            echo "==============================="

            # ── SYSTEM CHECK ──
            echo ""
            echo "====== SYSTEM INFO ======"
            whoami
            node -v  || { echo "❌ Node not found — install Node on EC2"; exit 1; }
            npm -v   || { echo "❌ npm not found"; exit 1; }
            pm2 -v   || { echo "❌ PM2 not found — run: npm install -g pm2"; exit 1; }

            # ── NAVIGATE TO APP ──
            echo ""
            echo "====== NAVIGATING TO APP ======"
            cd ${{ env.APP_DIR }} || { echo "❌ Directory ${{ env.APP_DIR }} not found"; exit 1; }
            echo "✅ In directory: $(pwd)"

            # ── SAVE LAST GOOD COMMIT (for rollback) ──
            echo ""
            echo "====== SAVING LAST GOOD COMMIT ======"
            LAST_GOOD_COMMIT=$(git rev-parse HEAD)
            echo $LAST_GOOD_COMMIT > /tmp/last_good_commit.txt
            echo "✅ Saved last good commit: $LAST_GOOD_COMMIT"

            # ── GIT PULL ──
            echo ""
            echo "====== GIT PULL ======"
            git fetch origin || { echo "❌ Git fetch failed — check deploy keys"; exit 1; }
            git pull origin main || { echo "❌ Git pull failed"; exit 1; }
            echo "✅ Git pull successful"

            # ── INSTALL DEPENDENCIES ──
            echo ""
            echo "====== INSTALLING DEPENDENCIES ======"
            npm ci --omit=dev || { echo "❌ npm install failed — check package.json"; exit 1; }
            echo "✅ Dependencies installed"

            # ── PM2 STATUS BEFORE ──
            echo ""
            echo "====== PM2 STATUS (BEFORE) ======"
            pm2 list

            # ── RESTART APP ──
            echo ""
            echo "====== RESTARTING APP ======"
            pm2 reload ${{ env.PM2_APP_NAME }} \
              || pm2 start app.js --name ${{ env.PM2_APP_NAME }} \
              || { echo "❌ PM2 failed to start — check app.js path or ecosystem.config.js"; exit 1; }
            pm2 save
            echo "✅ App restarted"

            # ── WAIT FOR APP TO STABILIZE ──
            echo ""
            echo "====== WAITING FOR APP TO STABILIZE ======"
            sleep 5

            # ── HEALTH CHECK ──
            echo ""
            echo "====== HEALTH CHECK ======"
            STATUS=$(pm2 jlist | python3 -c "
            import sys, json
            procs = json.load(sys.stdin)
            app = next((p for p in procs if p['name'] == '${{ env.PM2_APP_NAME }}'), None)
            print(app['pm2_env']['status'] if app else 'not_found')
            ")
            echo "PM2 Status: $STATUS"

            if [ "$STATUS" != "online" ]; then
              echo "❌ App is not online after restart (status: $STATUS)"
              echo ""
              echo "====== APP LOGS (last 30 lines) ======"
              pm2 logs ${{ env.PM2_APP_NAME }} --lines 30 --nostream
              exit 1
            fi

            echo "✅ App is online"

            # ── FINAL LOGS ──
            echo ""
            echo "====== APP LOGS (last 10 lines) ======"
            pm2 logs ${{ env.PM2_APP_NAME }} --lines 10 --nostream

            echo ""
            echo "==============================="
            echo "  ✅ DEPLOYMENT SUCCESSFUL"
            echo "  Commit: ${{ steps.vars.outputs.sha }}"
            echo "  Time:   $(date)"
            echo "==============================="

      # ── AUTO ROLLBACK IF DEPLOY FAILED ──
      - name: Auto Rollback
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          command_timeout: 10m
          script: |

            echo "==============================="
            echo "  ⚠️  DEPLOYMENT FAILED"
            echo "  STARTING AUTO ROLLBACK..."
            echo "==============================="

            cd ${{ env.APP_DIR }} || exit 1

            # ── RESTORE LAST GOOD COMMIT ──
            if [ -f /tmp/last_good_commit.txt ]; then
              ROLLBACK_SHA=$(cat /tmp/last_good_commit.txt)
              echo "Rolling back to: $ROLLBACK_SHA"
              git checkout $ROLLBACK_SHA || { echo "❌ Rollback checkout failed"; exit 1; }
            else
              echo "No saved commit found, rolling back 1 commit..."
              git checkout HEAD~1 || { echo "❌ Rollback failed"; exit 1; }
            fi

            npm ci --omit=dev || { echo "❌ npm install failed during rollback"; exit 1; }
            pm2 reload ${{ env.PM2_APP_NAME }} || pm2 start app.js --name ${{ env.PM2_APP_NAME }} || exit 1
            pm2 save

            echo ""
            echo "==============================="
            echo "  ✅ ROLLBACK SUCCESSFUL"
            echo "==============================="

  # ─────────────────────────────────────────
  # JOB 3: MANUAL ROLLBACK (trigger anytime)
  # ─────────────────────────────────────────
  manual-rollback:
    name: Manual Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Manual Rollback to Commit
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30s
          command_timeout: 10m
          script: |

            echo "==============================="
            echo "  MANUAL ROLLBACK STARTED"
            echo "  Target: ${{ github.event.inputs.commit_sha }}"
            echo "==============================="

            cd ${{ env.APP_DIR }} || exit 1
            git fetch origin || exit 1
            git checkout ${{ github.event.inputs.commit_sha }} || { echo "❌ Commit SHA not found"; exit 1; }
            npm ci --omit=dev || exit 1
            pm2 reload ${{ env.PM2_APP_NAME }} || pm2 start app.js --name ${{ env.PM2_APP_NAME }} || exit 1
            pm2 save

            echo "✅ Rolled back to ${{ github.event.inputs.commit_sha }}"

on:
  push:
    branches: [main]
  workflow_dispatch:              # enables manual trigger from GitHub UI
    inputs:
      commit_sha:
        description: 'Commit SHA to rollback to (find in git log)'
        required: true
        type: string